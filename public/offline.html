<!DOCTYPE html>
<html lang="en" style="background:#111827;color:#F9FAFB;font-family:Arial,sans-serif">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>You're Offline — FweezyTech</title>
  <link rel="icon" href="/favicon.png">
</head>
<body style="display:flex;flex-direction:column;align-items:center;
             justify-content:center;min-height:100vh;padding:24px;text-align:center">
  <div style="width:80px;height:80px;background:#0066FF;border-radius:16px;
              display:flex;align-items:center;justify-content:center;
              font-size:48px;font-weight:bold;color:white;margin-bottom:24px">F</div>
  <h1 style="font-size:28px;margin:0 0 12px">You're offline</h1>
  <p style="color:#9CA3AF;max-width:320px;line-height:1.6">
    No connection detected. Pages you've visited before are available below —
    or check back when you're online for the latest from Fweezy.
  </p>
  <button onclick="window.location.reload()"
    style="margin-top:24px;padding:12px 28px;background:#0066FF;color:white;
           border:none;border-radius:8px;font-size:16px;cursor:pointer">
    Try Again
  </button>
</body>
</html>
